  /medicines/adjust-stock:
    post:
      operationId: adjustStock
      tags: [medicines]
      summary: Manual stock adjustment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustmentBody"
      responses:
        "200":
