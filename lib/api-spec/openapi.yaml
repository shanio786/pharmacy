components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── AUTH ──────────────────────────────────────────────────────────────────
    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, username, fullName, role, isActive, createdAt]

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
        isActive:
          type: boolean
      required: [username, password, fullName, role]

    UpdateUserBody:
      type: object
      properties:
        fullName:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        password:
          type: ["string", "null"]

    # ─── LOOKUP TABLES ──────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
      required: [id, name]

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
      required: [name]

    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: ["string", "null"]
      required: [id, name]

    CreateCompanyBody:
      type: object
      properties:
        name:
          type: string
        country:
          type: ["string", "null"]
      required: [name]

    Unit:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required: [id, name]

    CreateUnitBody:
      type: object
      properties:
        name:
          type: string
      required: [name]

    Rack:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
      required: [id, name]

    CreateRackBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
      required: [name]

    GenericName:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required: [id, name]

    CreateGenericNameBody:
      type: object
      properties:
        name:
          type: string
      required: [name]

    # ─── MEDICINES ─────────────────────────────────────────────────────────────
    Medicine:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        genericNameId:
          type: ["integer", "null"]
        genericName:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        companyId:
          type: ["integer", "null"]
        companyName:
          type: ["string", "null"]
        unitId:
          type: ["integer", "null"]
        unitName:
          type: ["string", "null"]
        rackId:
          type: ["integer", "null"]
        rackName:
          type: ["string", "null"]
        strength:
          type: ["string", "null"]
        packingLabel:
          type: ["string", "null"]
        conversionFactor:
          type: integer
        salePrice:
          type: number
        purchasePrice:
          type: number
        reorderLevel:
          type: integer
        isControlled:
          type: boolean
        defaultSaleUnit:
          type: string
        barcode:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, name, conversionFactor, salePrice, purchasePrice, reorderLevel, isControlled, defaultSaleUnit, createdAt]

    MedicineWithStock:
      allOf:
        - $ref: "#/components/schemas/Medicine"
        - type: object
          properties:
            totalUnits:
              type: integer
            totalPacks:
              type: integer
            nearestExpiry:
              type: ["string", "null"]
          required: [totalUnits, totalPacks]

    CreateMedicineBody:
      type: object
      properties:
        name:
          type: string
        genericNameId:
          type: ["integer", "null"]
        categoryId:
          type: ["integer", "null"]
        companyId:
          type: ["integer", "null"]
        unitId:
          type: ["integer", "null"]
        rackId:
          type: ["integer", "null"]
        strength:
          type: ["string", "null"]
        packingLabel:
          type: ["string", "null"]
        conversionFactor:
          type: integer
        salePrice:
          type: number
        purchasePrice:
          type: number
        reorderLevel:
          type: integer
        isControlled:
          type: boolean
        defaultSaleUnit:
          type: string
        barcode:
          type: ["string", "null"]
      required: [name, conversionFactor, salePrice, purchasePrice, reorderLevel, isControlled, defaultSaleUnit]

    UpdateMedicineBody:
      type: object
      properties:
        name:
          type: string
        genericNameId:
          type: ["integer", "null"]
        categoryId:
          type: ["integer", "null"]
        companyId:
          type: ["integer", "null"]
        unitId:
          type: ["integer", "null"]
        rackId:
          type: ["integer", "null"]
        strength:
          type: ["string", "null"]
        packingLabel:
          type: ["string", "null"]
        conversionFactor:
          type: integer
        salePrice:
          type: number
        purchasePrice:
          type: number
        reorderLevel:
          type: integer
        isControlled:
          type: boolean
        defaultSaleUnit:
          type: string
        barcode:
          type: ["string", "null"]

    Batch:
      type: object
      properties:
        id:
          type: integer
        medicineId:
          type: integer
        batchNo:
          type: string
        expiryDate:
          type: string
        quantityUnits:
          type: integer
        purchasePrice:
          type: number
        salePrice:
          type: number
      required: [id, medicineId, batchNo, expiryDate, quantityUnits, purchasePrice, salePrice]

    StockAdjustmentBody:
      type: object
      properties:
        medicineId:
          type: integer
        batchId:
          type: ["integer", "null"]
        adjustmentUnits:
          type: integer
        reason:
          type: string
        note:
          type: ["string", "null"]
      required: [medicineId, adjustmentUnits, reason]

    # ─── SUPPLIERS ─────────────────────────────────────────────────────────────
    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        balance:
          type: number
        createdAt:
          type: string
      required: [id, name, balance, createdAt]

    CreateSupplierBody:
      type: object
      properties:
        name:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
      required: [name]

    # ─── CUSTOMERS ─────────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        creditLimit:
          type: number
        balance:
          type: number
        createdAt:
          type: string
      required: [id, name, creditLimit, balance, createdAt]

    CreateCustomerBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        creditLimit:
          type: number
      required: [name]

    LedgerResponse:
      type: object
      properties:
        balance:
          type: number
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AccountLedgerEntry"
      required: [balance, entries]

    AccountLedgerEntry:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        type:
          type: string
        referenceId:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        debit:
          type: number
        credit:
          type: number
        balance:
          type: number
      required: [date, type, debit, credit, balance]

    PaymentBody:
      type: object
      properties:
        amount:
          type: number
        notes:
          type: ["string", "null"]
        date:
          type: ["string", "null"]
      required: [amount]

    # ─── PURCHASES ─────────────────────────────────────────────────────────────
    Purchase:
      type: object
      properties:
        id:
          type: integer
        supplierId:
          type: ["integer", "null"]
        supplierName:
          type: ["string", "null"]
        invoiceNo:
          type: ["string", "null"]
        date:
          type: string
        totalAmount:
          type: number
        status:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, date, totalAmount, status, createdAt]

    PurchaseItem:
      type: object
      properties:
        id:
          type: integer
        medicineId:
          type: integer
        medicineName:
          type: string
        batchNo:
          type: string
        batchId:
          type: ["integer", "null"]
        expiryDate:
          type: string
        packsReceived:
          type: number
        unitsReceived:
          type: number
        purchasePrice:
          type: number
        salePrice:
          type: number
        totalAmount:
          type: number
      required: [id, medicineId, medicineName, batchNo, expiryDate, packsReceived, unitsReceived, purchasePrice, salePrice, totalAmount]

    PurchaseWithItems:
      allOf:
        - $ref: "#/components/schemas/Purchase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/PurchaseItem"
          required: [items]

    CreatePurchaseBody:
      type: object
      properties:
        supplierId:
          type: ["integer", "null"]
        invoiceNo:
          type: ["string", "null"]
        date:
          type: string
        notes:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreatePurchaseItemBody"
      required: [date, items]

    CreatePurchaseItemBody:
      type: object
      properties:
        medicineId:
          type: integer
        batchNo:
          type: string
        expiryDate:
          type: string
        packsReceived:
          type: number
        purchasePrice:
          type: number
        salePrice:
          type: number
      required: [medicineId, batchNo, expiryDate, packsReceived, purchasePrice, salePrice]

    SaleBasedPOBody:
      type: object
      properties:
        dateFrom:
          type: string
        dateTo:
          type: string
        supplierId:
          type: ["integer", "null"]
      required: [dateFrom, dateTo]

    DraftPOItem:
      type: object
      properties:
        medicineId:
          type: integer
        medicineName:
          type: string
        companyName:
          type: ["string", "null"]
        unitsSold:
          type: integer
        suggestedPacks:
          type: number
        purchasePrice:
          type: number
      required: [medicineId, medicineName, unitsSold, suggestedPacks, purchasePrice]

    PurchaseOrder:
      type: object
      properties:
        id:
          type: integer
        supplierId:
          type: ["integer", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        createdBy:
          type: ["integer", "null"]
