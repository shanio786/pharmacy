                items:
                  $ref: "#/components/schemas/DraftPOItem"

  /purchase-orders:
    post:
      operationId: createPurchaseOrder
      tags: [purchaseOrders]
      summary: Create a draft purchase order with items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurchaseOrderBody"
      responses:
