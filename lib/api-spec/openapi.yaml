  # ─── PURCHASES / GRN ────────────────────────────────────────────────────────
  /purchases:
    get:
      operationId: listPurchases
      tags: [purchases]
      parameters:
        - name: supplierId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
