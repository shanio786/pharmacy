  # ─── MEDICINES ──────────────────────────────────────────────────────────────
  /medicines:
    get:
      operationId: listMedicines
      tags: [medicines]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          schema:
            type: integer
        - name: genericNameId
          in: query
          schema:
            type: integer
        - name: isControlled
          in: query
          schema:
            type: boolean
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of medicines with stock
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MedicineWithStock"
    post:
      operationId: createMedicine
      tags: [medicines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicineBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"

  /medicines/{id}:
    get:
      operationId: getMedicine
      tags: [medicines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medicine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicineWithStock"
    patch:
      operationId: updateMedicine
      tags: [medicines]
      parameters:
