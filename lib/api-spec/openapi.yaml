  /medicines/{id}/alternatives:
    get:
      operationId: getMedicineAlternatives
      tags: [medicines]
      summary: Get medicines with the same generic name
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
