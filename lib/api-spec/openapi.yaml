  # ─── PURCHASE RETURNS ────────────────────────────────────────────────────────
  /purchase-returns:
    get:
      operationId: listPurchaseReturns
      tags: [purchaseReturns]
      parameters:
        - name: supplierId
          in: query
          schema:
            type: integer
        - name: dateFrom
          in: query
          schema:
